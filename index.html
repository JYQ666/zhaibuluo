<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宅部落全屋定制 - 享品质生活·就选宅部落</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Swiper.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js" defer></script>
  
  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js" defer></script>
  
  <!-- Three.js + Vanta.js (开屏动画) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.fog.min.js"></script>
  
  <!-- Main Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Splash Screen (Vanta.js Fog 开屏动画) -->
  <div class="splash" id="splash">
    <div class="splash__content">
      <div class="splash__logo" id="splash-logo">
        <!-- Logo will be injected by JS -->
      </div>
      <div class="splash__name" id="splash-name"></div>
    </div>
  </div>
  
  <!-- Hero Section -->
  <section class="hero" id="hero">
    <!-- Content will be rendered by JavaScript -->
  </section>
  
  <!-- Featured Section -->
  <section class="featured" id="featured">
    <!-- Content will be rendered by JavaScript -->
  </section>
  
  <!-- Community Section -->
  <section class="community" id="community">
    <!-- Content will be rendered by JavaScript -->
  </section>
  
  <!-- Cases Section (hidden by default) -->
  <section class="cases" id="cases" style="display: none;">
    <!-- Content will be rendered by JavaScript -->
  </section>
  
  <!-- Footer Section -->
  <footer class="footer" id="footer">
    <!-- Content will be rendered by JavaScript -->
  </footer>
  
  <!-- Main Script -->
  <script src="js/main.js"></script>
</body>
</html>
